<!DOCTYPE html>
<html>
<head>
  <title>My Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    .box {
      background: white;
      color: black;
      width: 80%;
      margin: 50px auto;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px gray;
    }

    h1 {
      color: #333;
    }

    p {
      font-size: 18px;
    }

    input {
      padding: 10px;
      width: 80%;
      border-radius: 5px;
      border: 1px solid gray;
    }

    form {
      margin-top: 20px;
    }

    button {
      padding: 12px 20px;
      background: #4facfe;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0077ff;
    }
  </style>
</head>

<body>

  <header>🌐 My Website</header>

  <div class="box">
    <h1>እንኳን ደህና መጡ</h1>
    <p>ይህ የእኔ የተሻለ ዌብሳይት ነው</p>
    <button onclick="alert('ሰላም!')">Click Me</button>
  </div>

  <h2>Register</h2>

  <form action="http://127.0.0.1:5000/register" method="POST">
    <input name="name" placeholder="Name" required><br><br>
    <input name="email" type="email" placeholder="Email" required><br><br>
    <input name="password" type="password" placeholder="Password" required><br><br>
    <button type="submit">Register</button>
  </form>

</body>
</html>

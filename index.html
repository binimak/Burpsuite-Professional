
<!DOCTYPE html>
<html>
<head>
  <title>My Website</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(to right, #4facfe, #00f2fe);
      color: white;
      text-align: center;
    }

    header {
      padding: 20px;
      font-size: 24px;
      font-weight: bold;
    }

    .box {
      background: white;
      color: black;
      width: 80%;
      margin: 50px auto;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0px 0px 10px gray;
    }

    h1 {
      color: #333;
    }

    p {
      font-size: 18px;
    }

    button {
      padding: 12px 20px;
      background: #4facfe;
      color: white;
      border: none;
      border-radius: 5px;
      cursor: pointer;
    }

    button:hover {
      background: #0077ff;
    }
  </style>
</head>

<body>

  <header>🌐 My Website</header>

  <div class="box">
    <h1>እንኳን ደህና መጡ</h1>
    <p>ይህ የእኔ የተሻለ ዌብሳይት ነው</p>

    <button onclick="alert('ሰላም!')">Click Me</button>
  </div>

</body>
</html>
